name: UGC Monitor - json-store

on:
  schedule:
    - cron: '0,30 * * * *'  # 每个小时的00分和30分执行监控
    - cron: '0 8 * * *'      # 每天08:00执行日报
  workflow_dispatch:  # 允许手动触发
    inputs:
      task_type:
        description: 'Task type to run'
        required: true
        default: 'monitor'
        type: choice
        options:
          - monitor
          - daily-report
  push:
    branches:
      - feat/json-store  # 在feat/json-store分支push时自动执行

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests matplotlib
          
      - name: Run monitor script
        if: github.event.schedule != '0 8 * * *' && github.event.inputs.task_type != 'daily-report'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        run: python monitor.py
        
      - name: Run daily report
        if: github.event.schedule == '0 8 * * *' || github.event.inputs.task_type == 'daily-report'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        run: python monitor.py --daily-report
