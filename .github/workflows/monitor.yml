name: UGC Monitor - json-store

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分钟执行一次
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - feat/json-store  # 在feat/json-store分支push时自动执行

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          
      - name: Run monitor script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        run: python monitor.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          if [ -f "previous_data.json" ]; then
            git add previous_data.json
            git commit -m 'Update monitor data' || echo 'No changes to commit'
            git push
          else
            echo 'previous_data.json not found, skipping commit'
          fi