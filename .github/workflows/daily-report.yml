name: UGC Daily Report - json-store

on:
  schedule:
    - cron: '0 16,4 * * *'   # 每天用户时区的00:00和12:00执行日报（UTC+8）
  workflow_dispatch:  # 允许手动触发
    inputs:
      task_type:
        description: 'Task type to run'
        required: true
        default: 'daily-report'
        type: choice
        options:
          - daily-report

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests matplotlib
          
      - name: Run daily report
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.qq.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || 587 }}
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          DATA_REPO_OWNER: ${{ secrets.DATA_REPO_OWNER || 'tutsau' }}
          DATA_REPO_NAME: ${{ secrets.DATA_REPO_NAME || 'yuanshen-my-ugc-monitor-data' }}
        run: python monitor_all.py --daily-report
